<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queering the Banks | Rutgers New Brunswick</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --rutgers-red: #cc0033;
            --dark-grey: #5f6a72;
        }

        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Header Overlay */
        .overlay {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
            border: 3px solid var(--rutgers-red);
            min-width: 300px;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--rutgers-red); letter-spacing: -0.5px; }
        p { margin: 0; font-size: 0.85rem; color: var(--dark-grey); font-weight: bold; }
        
        /* Inspiration Subtitle */
        .inspiration-text { margin-top: 4px; font-size: 0.75rem; color: var(--dark-grey); font-weight: normal; }
        .inspiration-text a { color: var(--rutgers-red); text-decoration: none; font-weight: bold; }
        .inspiration-text a:hover { text-decoration: underline; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .leaflet-popup-content { font-size: 14px; line-height: 1.4; width: 220px !important; }
        
        textarea { 
            width: 100%; height: 80px; margin-top: 10px; 
            border: 1px solid #ddd; border-radius: 8px; 
            padding: 8px; box-sizing: border-box; font-family: inherit;
            resize: none;
        }

        .save-btn { 
            background: var(--rutgers-red); color: white; border: none; 
            padding: 10px; width: 100%; margin-top: 10px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: opacity 0.2s;
        }
        .save-btn:hover { opacity: 0.8; }

        /* Custom Marker Style */
        .joy-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            cursor: pointer;
            transition: transform 0.2s;
        }
        .joy-marker:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="overlay">
        <h1>Queering the Banks</h1>
        <p>A Map of Rutgers Queer Joy</p>
        <p class="inspiration-text">Based on <a href="https://www.queeringthemap.com/" target="_blank">Queering The Map</a></p>
        
        <div style="margin-top: 12px; display: flex; gap: 5px;">
            <input type="text" id="searchInput" placeholder="Search building (e.g. casc, scott)..." 
                   style="padding: 8px; border-radius: 6px; border: 1px solid #ccc; width: 100%;">
            <button id="searchBtn" onclick="searchBuilding()" 
                    style="background: var(--rutgers-red); color: white; border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; min-width: 50px; font-weight:bold;">Go</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.js"></script>

    <script>
        // --- 1. FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyBCz-Qjr8cisMb9Kgalf_VvbGD7YygOK3M",
            authDomain: "mapsrus.firebaseapp.com",
            projectId: "mapsrus",
            storageBucket: "mapsrus.firebasestorage.app",
            messagingSenderId: "806422201925",
            appId: "1:806422201925:web:939dad145450239f83c52c",
            measurementId: "G-9K51Q6FVJZ",
            databaseURL: "https://mapsrus-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 2. MAP SETUP ---
        const map = L.map('map', { zoomControl: false }).setView([40.5000, -74.4474], 16);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // OpenStreetMap tiles (shows building names natively)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- 3. LOGIC: CLICK TO DROP PIN ---
        map.on('click', function(e) {
            const { lat, lng } = e.latlng;
            const popupContent = `
                <div>
                    <strong style="color:#cc0033">✨ Share a Moment of Joy</strong>
                    <select id="emojiInput" style="width:100%; margin-top:8px; padding:5px; border-radius:5px; border: 1px solid #ccc;">
                        <option value="❤️">❤️ Love</option>
                        <option value="🧡">🧡 Funny</option>
                        <option value="💛">💛 Heartwarming</option>
                        <option value="💚">💚 Gay Crisis</option>
                        <option value="🩵">🩵 Advocacy/Social Justice</option>
                        <option value="💙">💙 Allyship</option>
                        <option value="💜">💜 Community</option>
                    </select>
                    <textarea id="storyInput" placeholder="What moment of queer joy happened here? (e.g., first kiss, joined community event, etc...)"></textarea>
                    <button class="save-btn" onclick="savePin(${lat}, ${lng})">Add to the Map</button>
                </div>
            `;
            L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
        });

        function savePin(lat, lng) {
            const story = document.getElementById('storyInput').value;
            const emoji = document.getElementById('emojiInput').value;
            
            if (!story.trim()) return alert("Please share a story before posting!");

            database.ref('pins/').push({
                lat: lat,
                lng: lng,
                story: story,
                emoji: emoji,
                timestamp: Date.now()
            });
            map.closePopup();
        }

        // --- 4. LOGIC: LOAD PINS REAL-TIME ---
        database.ref('pins/').on('child_added', (snapshot) => {
            const data = snapshot.val();
            const displayEmoji = data.emoji || '❤️'; // Fallback to heart if old pin

            const joyIcon = L.divIcon({
                html: `<div class="joy-marker" style="font-size: 28px;">${displayEmoji}</div>`,
                className: 'custom-div-icon',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            L.marker([data.lat, data.lng], { icon: joyIcon })
                .addTo(map)
                .bindPopup(`
                    <div style="text-align:center">
                        <span style="font-size:0.7rem; color:#888;">${new Date(data.timestamp).toLocaleDateString()}</span><br>
                        <p style="margin-top:8px; font-size:1rem; text-align:left;">"${data.story}"</p>
                    </div>
                `);
        });

        // --- 5. LOGIC: SMART FUZZY SEARCH + API FALLBACK ---
        
        // Custom dataset of common Rutgers spots and their nicknames
        const rutgersBuildings = [
            { name: "College Avenue Student Center", aliases: ["casc", "rutgers student center", "student center col ave"], lat: 40.5026, lon: -74.4518 },
            { name: "Scott Hall", aliases: ["scott", "sc", "scott building"], lat: 40.4996, lon: -74.4475 },
            { name: "Alexander Library", aliases: ["alexander", "alex", "library"], lat: 40.5033, lon: -74.4515 },
            { name: "Voorhees Mall", aliases: ["voorhees", "mall"], lat: 40.4988, lon: -74.4468 },
            { name: "The Yard", aliases: ["ru living", "the yard @ college ave", "yard"], lat: 40.4994, lon: -74.4452 },
            { name: "Busch Student Center", aliases: ["bsc", "busch center"], lat: 40.5232, lon: -74.4622 },
            { name: "Livingston Student Center", aliases: ["lsc", "livi student center"], lat: 40.5245, lon: -74.4375 },
            { name: "Douglass Student Center", aliases: ["dsc", "douglass center"], lat: 40.4831, lon: -74.4373 },
            { name: "Cook Student Center", aliases: ["csc", "cook center"], lat: 40.4788, lon: -74.4344 },
            { name: "Rutgers Academic Building", aliases: ["ab", "academic building"], lat: 40.5035, lon: -74.4485 },
            { name: "Center for Social Justice / Pride Center", aliases: ["pride center", "social justice", "lgbq center"], lat: 40.4997, lon: -74.4478 },
            { name: "Zimmerli Art Museum", aliases: ["zimmerli", "art museum"], lat: 40.4991, lon: -74.4460 }
        ];

        // Configure Fuse.js for typo-tolerance
        const fuse = new Fuse(rutgersBuildings, {
            keys: ['name', 'aliases'],
            threshold: 0.4 // Allows slight misspellings!
        });

        async function searchBuilding() {
            const searchBtn = document.getElementById('searchBtn');
            const query = document.getElementById('searchInput').value.trim();
            
            if (!query) return;
            searchBtn.innerText = "⏳";

            // 1. Try Smart Local Search First (Catches typos & acronyms)
            const fuzzyResults = fuse.search(query);
            
            if (fuzzyResults.length > 0) {
                const bestMatch = fuzzyResults[0].item;
                map.flyTo([bestMatch.lat, bestMatch.lon], 18);
                
                L.popup()
                    .setLatLng([bestMatch.lat, bestMatch.lon])
                    .setContent(`<div style="text-align:center;"><b>📍 ${bestMatch.name}</b><br><span style="font-size:12px;color:gray;">Click to drop a pin!</span></div>`)
                    .openOn(map);
                    
                searchBtn.innerText = "Go";
                return;
            }

            // 2. If not found locally, fallback to OpenStreetMap API
            try {
                const searchQuery = encodeURIComponent(query + " Rutgers New Brunswick");
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${searchQuery}&format=json&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    map.flyTo([lat, lon], 18);
                    
                    L.popup()
                        .setLatLng([lat, lon])
                        .setContent(`<div style="text-align:center;"><b>📍 ${query}</b><br><span style="font-size:12px;color:gray;">Click to drop a pin!</span></div>`)
                        .openOn(map);
                } else {
                    alert("Building not found! Try checking your spelling or zooming in manually.");
                }
            } catch (error) {
                console.error("Search error:", error);
                alert("Search temporarily unavailable.");
            } finally {
                searchBtn.innerText = "Go";
            }
        }
        
        // Allow users to press 'Enter' in the search bar
        document.getElementById("searchInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                searchBuilding();
            }
        });
    </script>
</body>
</html>
